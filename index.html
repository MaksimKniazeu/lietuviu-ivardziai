<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1f7a5a">
<title>Литовские местоимения — тренажёр</title>
<style>
  :root{
    --bg:#f6f7f5; --card:#ffffff; --ink:#1d2421; --muted:#6b756f;
    --line:#e4e8e4; --accent:#1f7a5a; --accent-soft:#e6f1ec;
    --good:#1f7a5a; --good-bg:#e6f4ec; --bad:#c0392b; --bad-bg:#fbeaea;
    --hint-bg:#fff8e8; --hint-line:#f0dca6;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#14171a; --card:#1d2125; --ink:#e8ebe8; --muted:#9aa49d;
      --line:#2c3238; --accent:#43b98a; --accent-soft:#1c3a30;
      --good:#43b98a; --good-bg:#173028; --bad:#e57368; --bad-bg:#3a1f1d;
      --hint-bg:#2a2616; --hint-line:#4d4424;
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:640px; margin:0 auto; padding:18px 16px 40px}
  header h1{font-size:19px; margin:2px 0 2px; font-weight:650}
  header p{margin:0; color:var(--muted); font-size:13px}

  .filters{display:flex; flex-wrap:wrap; gap:7px; margin:16px 0 8px}
  .chip{
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer; user-select:none;
  }
  .chip.active{background:var(--accent); border-color:var(--accent); color:#fff}

  .stats{display:flex; justify-content:space-between; align-items:center; color:var(--muted); font-size:13px; margin:6px 2px 12px}
  .stats b{color:var(--ink); font-weight:600}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px 18px; box-shadow:0 1px 2px rgba(0,0,0,.04);
  }
  .meta{font-size:12px; color:var(--muted); margin-bottom:12px; display:flex; gap:8px; flex-wrap:wrap}
  .tag{background:var(--accent-soft); color:var(--accent); border-radius:6px; padding:2px 8px; font-weight:600}
  .sentence{font-size:21px; line-height:1.5; margin:2px 0 18px}
  .blank{display:inline-block; min-width:62px; border-bottom:2px dashed var(--accent); text-align:center; color:var(--accent); font-weight:600; padding:0 6px}
  .blank.filled{border-bottom-style:solid}

  .opts{display:grid; gap:9px}
  .opt{
    width:100%; text-align:left; border:1.5px solid var(--line); background:var(--card); color:var(--ink);
    border-radius:12px; padding:13px 15px; font-size:18px; cursor:pointer; transition:.12s; font-weight:500;
  }
  .opt:active{transform:scale(.99)}
  .opt.correct{border-color:var(--good); background:var(--good-bg); color:var(--good)}
  .opt.wrong{border-color:var(--bad); background:var(--bad-bg); color:var(--bad)}
  .opt:disabled{cursor:default}

  .row{display:flex; gap:10px; margin-top:16px}
  .btn{
    flex:1; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:600; cursor:pointer;
  }
  .btn.ghost{background:transparent; border:1.5px solid var(--line); color:var(--ink)}
  .btn.primary{background:var(--accent); color:#fff}
  .btn:disabled{opacity:.45; cursor:default}

  .hint{
    margin-top:14px; background:var(--hint-bg); border:1px solid var(--hint-line);
    border-radius:12px; padding:14px 15px; font-size:14.5px; display:none;
  }
  .hint.show{display:block}
  .hint .h-row{margin:4px 0}
  .hint .h-label{color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.03em}
  .hint .lt{font-style:italic}
  footer{text-align:center; color:var(--muted); font-size:12px; margin-top:22px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lietuvių kalbos įvardžiai</h1>
    <p>Тренажёр литовских местоимений · работает офлайн</p>
  </header>

  <div class="filters" id="filters"></div>
  <div class="stats">
    <span>Верно: <b id="score">0</b> / <b id="total">0</b></span>
    <span id="acc"></span>
  </div>

  <div class="card">
    <div class="meta">
      <span class="tag" id="catTag"></span>
      <span id="pronTag"></span>
    </div>
    <div class="sentence" id="sentence"></div>
    <div class="opts" id="opts"></div>

    <div class="row">
      <button class="btn ghost" id="hintBtn">💡 Подсказка</button>
      <button class="btn primary" id="nextBtn" disabled>Дальше →</button>
    </div>

    <div class="hint" id="hint"></div>
  </div>

  <footer>Один файл · ничего не отправляется в сеть · 32 местоимения</footer>
</div>

/* ---------- краткие описания падежей ---------- */
const CASE_INFO = [
 {re:/Vardininkas|именительн/i,  d:"отвечает на вопрос «kas?» (кто? что?). Это падеж подлежащего — того, кто выполняет действие."},
 {re:/Kilmininkas|родительн/i,   d:"отвечает на «ko? kieno?» (кого? чего? чей?). Принадлежность, отсутствие, отрицание, а также после предлогов be, iš, nuo и глаголов laukti, ieškoti, norėti."},
 {re:/Naudininkas|дательн/i,     d:"отвечает на «kam?» (кому?). Адресат действия — тот, кому что-то дают, говорят, помогают."},
 {re:/Galininkas|винительн/i,    d:"отвечает на «ką?» (кого? что?). Прямой объект действия (matyti, mylėti, kviesti) и после предлогов į, apie."},
 {re:/Įnagininkas|творительн/i,  d:"отвечает на «kuo? su kuo?» (кем? чем? с кем?). Орудие, средство или совместность; обязателен после предлога su и глаголов pasitikėti, didžiuotis."},
 {re:/Vietininkas|местн/i,       d:"отвечает на «kur? kame?» (где? в ком? в чём?). Обозначает место или нахождение внутри."},
];
function caseDesc(gr){ const m=CASE_INFO.find(c=>c.re.test(gr)); return m?m.d:null; }

/* ---------- сборка пула вопросов ---------- */
const POOL = [];
DATA.forEach(g => g.items.forEach(it => POOL.push({...it, cat:g.cat, pron:g.pron})));

const CATS = ["Все", ...Array.from(new Set(DATA.map(g => g.cat)))];

/* ---------- состояние ---------- */
let activeCat = "Все";
let score = 0, total = 0;
let current = null, answered = false;
let lastKey = null;

/* ---------- утилиты ---------- */
function shuffle(a){ // Fisher–Yates
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}
function pickQuestion(){
  let pool = activeCat==="Все" ? POOL : POOL.filter(q=>q.cat===activeCat);
  if(pool.length>1){ const f = pool.filter(q=> (q.cat+q.s)!==lastKey); if(f.length) pool=f; }
  const q = pool[Math.floor(Math.random()*pool.length)];
  lastKey = q.cat+q.s;
  return q;
}

/* ---------- отрисовка ---------- */
const $ = id => document.getElementById(id);

function renderFilters(){
  const box = $("filters"); box.innerHTML="";
  CATS.forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"+(c===activeCat?" active":"");
    b.textContent=c;
    b.onclick=()=>{ activeCat=c; renderFilters(); nextQuestion(); };
    box.appendChild(b);
  });
}

function render(q){
  current=q; answered=false;
  $("catTag").textContent=q.cat;
  $("pronTag").textContent=q.pron;
  $("sentence").innerHTML=q.s.replace("___",'<span class="blank" id="blank">?</span>');
  const opts=$("opts"); opts.innerHTML="";
  shuffle(q.o).forEach(opt=>{
    const b=document.createElement("button");
    b.className="opt"; b.textContent=opt;
    b.onclick=()=>choose(b,opt);
    opts.appendChild(b);
  });
  $("hint").className="hint";
  $("hint").innerHTML=buildHint(q);
  $("nextBtn").disabled=true;
}

function buildHint(q){
  let rows = "";
  rows += `<div class="h-row"><span class="h-label">Правильно</span><br><span class="lt">${q.s.replace("___","<b>"+q.a+"</b>")}</span></div>`;
  rows += `<div class="h-row"><span class="h-label">Перевод</span><br>${q.tr}</div>`;
  rows += `<div class="h-row"><span class="h-label">Форма / падеж</span><br>${q.gr}</div>`;
  const cd = caseDesc(q.gr);
  if(cd) rows += `<div class="h-row"><span class="h-label">О падеже</span><br>${cd}</div>`;
  rows += `<div class="h-row"><span class="h-label">Правило</span><br>${q.note}</div>`;
  return rows;
}

function choose(btn, opt){
  if(answered) return;
  answered=true;
  const correct = opt===current.a;
  // подсветить
  Array.from($("opts").children).forEach(b=>{
    b.disabled=true;
    if(b.textContent===current.a) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
  });
  const blank=$("blank");
  if(blank){ blank.textContent=current.a; blank.classList.add("filled"); }
  total++; if(correct) score++;
  updateStats();
  if(!correct) $("hint").classList.add("show"); // при ошибке сразу показываем объяснение
  $("nextBtn").disabled=false;
}

function updateStats(){
  $("score").textContent=score;
  $("total").textContent=total;
  $("acc").textContent = total ? Math.round(score/total*100)+"%" : "";
}

function nextQuestion(){ render(pickQuestion()); }

/* ---------- события ---------- */
$("hintBtn").onclick=()=> $("hint").classList.toggle("show");
$("nextBtn").onclick=()=> nextQuestion();

/* ---------- старт ---------- */
renderFilters();
updateStats();
nextQuestion();
</script>
